<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="chatbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FCE4EC"/>
    </linearGradient>
    <linearGradient id="chatbody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#chatbg)"/>

  <!-- Big speech bubble right -->
  <ellipse cx="630" cy="150" rx="120" ry="65" fill="#FFF8E1" stroke="#F9A825" stroke-width="5"/>
  <polygon points="550,185 520,230 590,190" fill="#FFF8E1" stroke="#F9A825" stroke-width="3" stroke-linejoin="round"/>
  <text x="630" y="162" font-family="Arial, sans-serif" font-size="34" text-anchor="middle" fill="#2E7D32">Hi!</text>

  <!-- Small speech bubble left -->
  <ellipse cx="145" cy="175" rx="80" ry="50" fill="#E1F5FE" stroke="#0277BD" stroke-width="4"/>
  <polygon points="195,205 230,240 210,200" fill="#E1F5FE" stroke="#0277BD" stroke-width="3" stroke-linejoin="round"/>
  <text x="145" y="185" font-family="Arial, sans-serif" font-size="30" text-anchor="middle" fill="#0277BD">?</text>

  <!-- Dragon body -->
  <ellipse cx="360" cy="380" rx="200" ry="80" fill="url(#chatbody)"/>

  <!-- Neck -->
  <path d="M430 340 Q500 315 580 295" stroke="#5D7A38" stroke-width="48" fill="none" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="555" cy="295" rx="68" ry="44" fill="#4A5A2E"/>
  <ellipse cx="600" cy="302" rx="32" ry="22" fill="#3E4A28"/>

  <!-- Eye -->
  <circle cx="550" cy="282" r="11" fill="#FFF9C4"/>
  <circle cx="553" cy="282" r="5" fill="#1A1A0A"/>

  <!-- Mouth line -->
  <path d="M572 316 Q602 322 618 312" stroke="#2E3718" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <path d="M595 318 Q615 332 605 355 Q582 352 574 338 Q562 328 595 318Z" fill="#FF8A65" opacity="0.9"/>

  <!-- Tail -->
  <path d="M155 425 Q75 425 42 385 Q16 352 46 328" stroke="#2E7D32" stroke-width="26" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <path d="M285 448 L265 522" stroke="#2E7D32" stroke-width="18" stroke-linecap="round"/>
  <path d="M335 445 L320 505" stroke="#4A5A2E" stroke-width="16" stroke-linecap="round"/>
  <path d="M415 452 L400 510" stroke="#3E4A28" stroke-width="16" stroke-linecap="round"/>
  <path d="M490 450 L520 515" stroke="#4A5A2E" stroke-width="16" stroke-linecap="round"/>

  <!-- Sound stars -->
  <g fill="#FFB300" opacity="0.9">
    <polygon points="480,175 490,192 510,193 496,206 499,225 480,216 461,225 464,206 450,193 470,192"/>
    <polygon points="250,220 258,232 272,233 262,244 265,258 250,251 235,258 238,244 228,233 242,232"/>
  </g>
</svg>
