<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="eatbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#E1F5FE"/>
    </linearGradient>
    <linearGradient id="eatbody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5D6E3B"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#eatbg)"/>

  <!-- Ground -->
  <ellipse cx="420" cy="520" rx="420" ry="110" fill="#C8A96E" opacity="0.9"/>
  <ellipse cx="420" cy="540" rx="380" ry="80" fill="#B08A4F" opacity="0.6"/>

  <!-- Food items -->
  <ellipse cx="185" cy="450" rx="50" ry="28" fill="#66BB6A"/>
  <ellipse cx="238" cy="432" rx="45" ry="24" fill="#43A047"/>
  <circle cx="308" cy="450" r="10" fill="#FF7043"/>
  <circle cx="338" cy="468" r="7" fill="#FFB300"/>
  <circle cx="290" cy="480" r="6" fill="#8D6E63"/>

  <!-- Dragon body -->
  <ellipse cx="360" cy="378" rx="190" ry="75" fill="url(#eatbody)"/>

  <!-- Neck -->
  <path d="M455 345 Q518 325 562 312" stroke="#5D6E3B" stroke-width="44" fill="none" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="538" cy="302" rx="68" ry="44" fill="#4A5A2E"/>
  <ellipse cx="580" cy="310" rx="32" ry="22" fill="#3E4A28"/>

  <!-- Eye -->
  <circle cx="530" cy="290" r="10" fill="#FFF9C4"/>
  <circle cx="532" cy="290" r="4" fill="#1A1A0A"/>

  <!-- Open mouth -->
  <path d="M555 318 Q585 328 600 318" stroke="#2E3718" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="577" cy="336" rx="22" ry="14" fill="#FF8A65" opacity="0.85"/>

  <!-- Tail -->
  <path d="M162 418 Q82 424 42 385 Q12 354 42 330" stroke="#3E4A28" stroke-width="26" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <path d="M285 435 L265 505" stroke="#3E4A28" stroke-width="18" stroke-linecap="round"/>
  <path d="M330 435 L315 490" stroke="#4A5A2E" stroke-width="16" stroke-linecap="round"/>
  <path d="M410 440 L395 500" stroke="#3E4A28" stroke-width="16" stroke-linecap="round"/>
  <path d="M480 435 L505 500" stroke="#4A5A2E" stroke-width="16" stroke-linecap="round"/>

  <!-- Claws -->
  <line x1="275" y1="510" x2="265" y2="522" stroke="#2E2E1A" stroke-width="5" stroke-linecap="round"/>
  <line x1="320" y1="495" x2="310" y2="505" stroke="#2E2E1A" stroke-width="5" stroke-linecap="round"/>
  <line x1="405" y1="505" x2="395" y2="518" stroke="#2E2E1A" stroke-width="5" stroke-linecap="round"/>
  <line x1="500" y1="505" x2="520" y2="520" stroke="#2E2E1A" stroke-width="5" stroke-linecap="round"/>

  <!-- Scale dots -->
  <g opacity="0.35" fill="#7CB342">
    <circle cx="290" cy="370" r="6"/>
    <circle cx="320" cy="388" r="5"/>
    <circle cx="350" cy="368" r="6"/>
    <circle cx="380" cy="392" r="5"/>
    <circle cx="410" cy="372" r="6"/>
    <circle cx="445" cy="392" r="5"/>
  </g>
</svg>
